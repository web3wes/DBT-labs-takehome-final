dbt_labs_takehome:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST') }}"
      user: "{{ env_var('DBT_POSTGRES_USER') }}"
      password: "{{ env_var('DBT_POSTGRES_PASSWORD') }}"
      port: 5432
      dbname: "{{ env_var('DBT_POSTGRES_DATABASE') }}"
      schema: dbt_dev
      threads: 4
      connect_timeout: 10

    prod:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST') }}"
      user: "{{ env_var('DBT_POSTGRES_USER') }}"
      password: "{{ env_var('DBT_POSTGRES_PASSWORD') }}"
      port: 5432
      dbname: "{{ env_var('DBT_POSTGRES_DATABASE') }}"
      schema: dbt_prod
      threads: 4
