version: 2

models:
  - name: int_order_items_enriched
    description: Order-item facts enriched with order and product attributes.
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
