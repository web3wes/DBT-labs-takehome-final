version: 2

models:
  - name: stg_orders
    description: Cleaned order-level records from the TheLook ecommerce sample dataset.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values: ["Cancelled", "Complete", "Processing", "Returned", "Shipped"]

  - name: stg_order_items
    description: Cleaned order-item records from the TheLook ecommerce sample dataset.
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: order_item_status
        tests:
          - accepted_values:
              arguments:
                values: ["Cancelled", "Complete", "Processing", "Returned", "Shipped"]

  - name: stg_products
    description: Cleaned product catalog data.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_users
    description: Cleaned customer records.
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
